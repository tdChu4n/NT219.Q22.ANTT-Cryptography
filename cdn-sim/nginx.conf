# =====================================================================
#  CDN-SIM · Nginx (Task T1.6 — Hardening)
#  - Byte-Range request cho segment .m4s/.mp4  (bắt buộc cho DASH/HLS seek)
#  - Tắt gzip cho video (đã nén, gzip = CPU waste + phá Range)
#  - Cache-Control: immutable cho segment, no-store cho manifest & key
#  - CORS chuẩn Shaka Player / dash.js / hls.js
#  - Chuẩn bị TLS 1.2/1.3 (block HTTPS để sẵn, kích hoạt khi có cert)
# =====================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- MIME types bổ sung cho streaming (các type chưa có trong mime.types) ----
    types {
        application/dash+xml   mpd;
        video/iso.segment      m4s;
    }

    # ---- Hiệu năng I/O cho file lớn (segment video) ----
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;          # ẩn version Nginx — giảm bề mặt tấn công

    # ---- Gzip: ON cho text, OFF cho video ----
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_types        application/dash+xml
                      application/vnd.apple.mpegurl
                      application/json
                      application/javascript
                      text/css
                      text/plain
                      text/xml;
    gzip_disable      "msie6";

    # ---- Log format có kèm Range header để kiểm tra Task T1.6 ----
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent range="$http_range" '
                    'ua="$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # =================================================================
    #  HTTP server (port 80)
    #  Khi TLS production → chuyển thành redirect 301 sang HTTPS.
    # =================================================================
    server {
        listen      80 default_server;
        server_name _;

        # ---- Health check ----
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # ---- License Server (Backend Node.js) ----
        # Dùng biến + resolver (Docker internal DNS 127.0.0.11) để:
        #   1) `nginx -t` standalone không fail khi license-server chưa chạy
        #   2) Cho phép license-server restart không cần reload Nginx
        location /license {
            resolver           127.0.0.11 valid=30s ipv6=off;
            set $license_upstream "license-server:3000";
            proxy_pass         http://$license_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Tuyệt đối KHÔNG cache Content Key
            proxy_no_cache     1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
            add_header Pragma        "no-cache" always;
        }

        # =============================================================
        #  Video segments  (/video/seg_xxx.m4s, .mpd, .m3u8, .mp4 …)
        #  Dùng `root` (không phải `alias`) để nested regex location
        #  kế thừa đúng đường dẫn gốc cho DASH/HLS.
        # =============================================================
        location /video/ {
            root /usr/share/nginx/html;   # file cuối = /usr/share/nginx/html/video/<file>

            # ---- CORS cho trình phát Web (Shaka Player / dash.js) ----
            add_header Access-Control-Allow-Origin   "*"                           always;
            add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"          always;
            add_header Access-Control-Allow-Headers  "Range, Origin, Content-Type" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges, Date, Server" always;

            # ---- Byte-Range request ----
            add_header Accept-Ranges "bytes" always;
            max_ranges 100;   # chặn multipart range tấn công DoS

            # ---- Tắt gzip cho toàn bộ /video/ (đã nén, tránh phá Range) ----
            gzip        off;
            gzip_static off;

            # Preflight CORS
            if ($request_method = OPTIONS) {
                add_header Content-Length 0;
                add_header Content-Type   text/plain;
                return 204;
            }

            # ---- Segment (immutable): cache dài hạn — đã mã hoá, không đổi ----
            # Không dùng `expires` vì sẽ sinh Cache-Control trùng với add_header.
            location ~* \.(m4s|mp4|m4v|ts)$ {
                add_header Cache-Control                 "public, max-age=2592000, immutable" always;
                add_header Access-Control-Allow-Origin   "*"                                  always;
                add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;
                gzip        off;
                gzip_static off;
            }

            # ---- Manifest (.mpd/.m3u8): KHÔNG cache ----
            location ~* \.(mpd|m3u8)$ {
                add_header Cache-Control               "no-cache, no-store, must-revalidate" always;
                add_header Pragma                      "no-cache" always;
                add_header Access-Control-Allow-Origin "*" always;
            }
        }
    }

    # =================================================================
    #  HTTPS server — TLS 1.3 + HSTS + Cert Pinning (Task T3.1)
    #  Self-signed cert: chạy gen-selfsigned-cert.ps1 hoặc gen-selfsigned-cert.sh
    #  Cert phải được mount vào /etc/nginx/certs/
    # =================================================================
    server {
        listen      443 ssl http2 default_server;
        server_name cdn.drm-local.dev localhost;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ---- Chỉ cho TLS 1.2 / 1.3 — chặn SSLv3, TLS1.0, TLS1.1 ----
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # ---- Session cache & tickets ----
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # ---- OCSP stapling ----
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout    5s;

        # ---- T3.1: HSTS — buộc HTTPS trong 1 năm ----
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ---- T3.1: Cert Pinning (Expect-CT) ----
        # report-uri là endpoint nhận báo cáo nếu cert bị sai
        add_header Expect-CT "max-age=86400, enforce, report-uri=\"http://localhost:3000/api/ct-report\"" always;

        # ---- Security Headers bổ sung ----
        add_header X-Content-Type-Options  "nosniff"          always;
        add_header X-Frame-Options         "DENY"             always;
        add_header X-XSS-Protection        "1; mode=block"    always;
        add_header Referrer-Policy         "no-referrer"      always;

        # ---- Health check ----
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # ---- License Server proxy (không cache) ----
        location /api/ {
            resolver           127.0.0.11 valid=30s ipv6=off;
            set $license_upstream "license-server:3000";
            proxy_pass         http://$license_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            proxy_no_cache     1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        }

        # ---- Video segments (/video/) ----
        location /video/ {
            root /usr/share/nginx/html;

            add_header Access-Control-Allow-Origin   "*"                           always;
            add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"          always;
            add_header Access-Control-Allow-Headers  "Range, Origin, Content-Type" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges, Date, Server" always;
            add_header Accept-Ranges "bytes" always;
            max_ranges 100;
            gzip        off;
            gzip_static off;

            if ($request_method = OPTIONS) {
                add_header Content-Length 0;
                add_header Content-Type   text/plain;
                return 204;
            }

            location ~* \.(m4s|mp4|m4v|ts)$ {
                add_header Cache-Control "public, max-age=2592000, immutable" always;
                gzip        off;
                gzip_static off;
            }

            location ~* \.(mpd|m3u8)$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
                add_header Pragma        "no-cache" always;
            }
        }
    }
}

