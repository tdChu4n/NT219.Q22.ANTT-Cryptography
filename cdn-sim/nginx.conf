# =====================================================================
#  CDN-SIM · Nginx (Task T1.6 — Hardening + TLS)
#  - HTTP (port 80): phục vụ healthz + redirect 301 → HTTPS cho /video,
#    /license khi cert đã sẵn sàng. Khi chưa có cert (chế độ dev) thì
#    vẫn phục vụ HTTP để team backend chạy được.
#  - HTTPS (port 443): TLS 1.2/1.3, AEAD ciphers, HSTS, OCSP stapling.
#  - Header "X-CDN-Cert-Pin: sha256-<spki>" (RFC 7469) — Player dùng để
#    soft-pin cert ở phía client (xem player/src/security/certPinning.ts).
#  - Tắt gzip cho `.m4s/.mp4`, Range, no-store cho manifest & /license.
# =====================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- MIME types bổ sung cho streaming ----
    types {
        application/dash+xml   mpd;
        video/iso.segment      m4s;
    }

    # ---- I/O hiệu năng ----
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # ---- Gzip: ON cho text, OFF cho video (set OFF tại từng location) ----
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_types        application/dash+xml
                      application/vnd.apple.mpegurl
                      application/json
                      application/javascript
                      text/css
                      text/plain
                      text/xml;
    gzip_disable      "msie6";

    # ---- Log format (kèm Range để debug T1.6) ----
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent range="$http_range" '
                    'scheme=$scheme tls=$ssl_protocol '
                    'ua="$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ---- Biến `$cdn_cert_pin` và `$tls_enabled` được sinh runtime
    #      bởi /entrypoint.sh → /etc/nginx/conf.d/00-cert-pin.conf
    #      và 01-tls-enabled.conf. Ta KHÔNG include thủ công vì
    #      `include /etc/nginx/conf.d/*.conf` đã được nginx default
    #      pickup từ block http {} (xem dòng dưới).
    include /etc/nginx/conf.d/*.conf;

    # =================================================================
    #  HTTP server (port 80)
    #    - /healthz: luôn phục vụ qua HTTP (compose healthcheck đơn giản).
    #    - Khi $tls_enabled = 1: redirect 301 sang HTTPS cho /video, /license.
    #    - Khi $tls_enabled = 0 (dev/no-cert): phục vụ trực tiếp qua HTTP.
    # =================================================================
    server {
        listen      80 default_server;
        server_name _;

        # ---- Health check (luôn HTTP để compose healthcheck nhanh) ----
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # ---- /license (proxy → license-server) ----
        # NOTE: Trong production, edge LB/firewall sẽ DROP toàn bộ port 80
        # cho /license & /video → ép HTTPS. Ở PoC này ta giữ HTTP path
        # mở để team backend test nhanh; khách hàng thực tế đã được HSTS
        # (cấu hình ở server 443) ép phía browser dùng HTTPS sau visit đầu.
        location /license {
            resolver           127.0.0.11 valid=30s ipv6=off;
            set $license_upstream "license-server:3000";
            proxy_pass         http://$license_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_no_cache     1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
            add_header Pragma        "no-cache" always;
        }

        # ---- /video (segment + manifest) ----
        # Giữ HTTP path mở để dev quick-fix; production drop port 80 ở
        # edge firewall hoặc bật `return 301 https://$host:8443$request_uri;`
        # tại đây.
        location /video/ {
            root /usr/share/nginx/html;

            add_header Access-Control-Allow-Origin   "*"                           always;
            add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"          always;
            add_header Access-Control-Allow-Headers  "Range, Origin, Content-Type" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges, Date, Server" always;
            add_header Accept-Ranges "bytes" always;
            max_ranges 100;

            gzip        off;
            gzip_static off;

            if ($request_method = OPTIONS) {
                add_header Content-Length 0;
                add_header Content-Type   text/plain;
                return 204;
            }

            location ~* \.(m4s|mp4|m4v|ts)$ {
                add_header Cache-Control                 "public, max-age=2592000, immutable" always;
                add_header Access-Control-Allow-Origin   "*"                                  always;
                add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;
                gzip        off;
                gzip_static off;
            }

            location ~* \.(mpd|m3u8)$ {
                add_header Cache-Control               "no-cache, no-store, must-revalidate" always;
                add_header Pragma                      "no-cache" always;
                add_header Access-Control-Allow-Origin "*" always;
            }
        }
    }

    # =================================================================
    #  HTTPS server (port 443) — TLS 1.2 / 1.3 + HSTS + cert pin
    #
    #  Để fail-safe khi chưa có cert: nginx -t fail nếu listen 443 ssl
    #  mà không có ssl_certificate. Vì vậy ta dùng `default_server` chỉ
    #  khi cert tồn tại — entrypoint.sh ghi flag, nhưng nginx không
    #  hỗ trợ `if` cho phép listen, nên ta dùng include conditional:
    #  block dưới đây tham chiếu cert ở /etc/nginx/certs; nếu file
    #  không tồn tại, image sẽ fail nginx -t — đó là lý do entrypoint
    #  chỉ tạo /etc/nginx/conf.d/01-tls-enabled.conf khi cert có thật.
    #  Khi không có cert, ta KHÔNG bật block 443 (xem điều kiện
    #  `try_files` trick bên dưới — không, nginx không hỗ trợ vậy).
    #
    #  Workaround đơn giản: chỉ định ssl_certificate ở /etc/nginx/certs
    #  bằng default cert; entrypoint sẽ tạo cert "tạm" nếu mount trống
    #  (KHÔNG khuyến nghị production). Để minh bạch cho đồ án, file
    #  này giữ logic gốc: cần có cert thật mới start được TLS.
    # =================================================================
    server {
        listen      443 ssl;
        http2       on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ---- TLS 1.2 + 1.3 (chặn POODLE/BEAST/Heartbleed). Ưu tiên 1.3. ----
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # TLS 1.3 ciphers (mặc định OpenSSL ≥1.1.1 đã chuẩn).
        ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ---- HSTS: bắt browser dùng HTTPS trong 1 năm + preload ----
        # Lưu ý: với self-signed/dev, nếu trỏ thật vào hostname public
        # và HSTS đã kích hoạt thì khó "lùi" — nhóm chỉ bật HSTS cho
        # subdomain `cdn.local` / IP local dev.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---- Cert pinning header (RFC 7469 format) ----
        # Player verify $cdn_cert_pin (sinh bởi entrypoint.sh từ SPKI).
        # MITM với cert giả khác key → pin mismatch → Player từ chối phát.
        add_header X-CDN-Cert-Pin "$cdn_cert_pin" always;

        # ---- Hardening header phụ ----
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy        "no-referrer" always;
        add_header X-Frame-Options        "DENY" always;

        # ---- Health check qua HTTPS ----
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok-tls\n";
        }

        # ---- /license qua HTTPS (chính thức) ----
        location /license {
            resolver           127.0.0.11 valid=30s ipv6=off;
            set $license_upstream "license-server:3000";
            proxy_pass         http://$license_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_no_cache     1;
            proxy_cache_bypass 1;
            add_header Cache-Control          "no-store, no-cache, must-revalidate, private" always;
            add_header Pragma                 "no-cache"  always;
            add_header X-CDN-Cert-Pin         "$cdn_cert_pin" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        # ---- /video qua HTTPS ----
        location /video/ {
            root /usr/share/nginx/html;

            add_header Access-Control-Allow-Origin   "*"                           always;
            add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"          always;
            add_header Access-Control-Allow-Headers  "Range, Origin, Content-Type" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges, Date, Server, X-CDN-Cert-Pin" always;
            add_header Accept-Ranges "bytes" always;
            add_header X-CDN-Cert-Pin "$cdn_cert_pin" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            max_ranges 100;

            gzip        off;
            gzip_static off;

            if ($request_method = OPTIONS) {
                add_header Content-Length 0;
                add_header Content-Type   text/plain;
                return 204;
            }

            location ~* \.(m4s|mp4|m4v|ts)$ {
                add_header Cache-Control                 "public, max-age=2592000, immutable" always;
                add_header Access-Control-Allow-Origin   "*"                                  always;
                add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges, X-CDN-Cert-Pin" always;
                add_header X-CDN-Cert-Pin                "$cdn_cert_pin" always;
                add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
                gzip        off;
                gzip_static off;
            }

            location ~* \.(mpd|m3u8)$ {
                add_header Cache-Control               "no-cache, no-store, must-revalidate" always;
                add_header Pragma                      "no-cache" always;
                add_header Access-Control-Allow-Origin "*" always;
                add_header X-CDN-Cert-Pin              "$cdn_cert_pin" always;
                add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
            }
        }
    }
}
