services:
  # 1. MongoDB lưu trữ Key ID và Content Key
  db:
    image: mongo:latest
    container_name: multimedia-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # 2. Backend của Chuẩn (Xác thực & Cấp License)
  license-server:
    build:
      context: ../license-server
    container_name: license-server
    depends_on:
      - db
    environment:
      - MONGO_URL=mongodb://db:27017/multimedia

  # 3. CDN/Web Server của Ân (Phân phối nội dung) — Task T1.6 hardened
  cdn-sim:
    build:
      context: ../cdn-sim
    container_name: cdn-sim
    ports:
      - "8080:80"     # HTTP (dev)
      - "8443:443"    # HTTPS (chuẩn bị TLS — bật khi mount cert)
    volumes:
      # Ánh xạ folder ENCRYPTED output (T2.1+T2.3) vào Nginx.
      # Lộc xuất manifest.mpd + manifest_rotation.mpd + các segment .m4s
      # đã mã hoá AES-128-CTR vào media-processing/output/.
      # (folder packager/output/ chứa output CLEAR cũ — KHÔNG dùng cho demo DRM)
      - ../media-processing/output:/usr/share/nginx/html/video:ro
      # Thư mục cert TLS — đặt fullchain.pem + privkey.pem để kích hoạt HTTPS
      - ../cdn-sim/certs:/etc/nginx/certs:ro

volumes:
  mongo-data:
